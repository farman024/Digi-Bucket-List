<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--panel:#16213e;--border:#0f3460;--accent:#e94560;--accent2:#f5a623;--accent3:#00d4ff;--green:#39ff14;--text:#e0e0ff;--text2:#8888bb;--card-bg:#0d0d1a;}
.light{--bg:#f0f0f5;--bg2:#e0e0f0;--bg3:#d0d0e8;--panel:#e8e8f8;--border:#a0a0d0;--text:#1a1a2e;--text2:#444466;--card-bg:#ffffff;--green:#228b22;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'VT323',monospace;font-size:20px;min-height:100vh;transition:background 0.3s,color 0.3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:0;}
.wrapper{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 16px 60px;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding:12px 20px;background:var(--panel);border:3px solid var(--accent);box-shadow:4px 4px 0 var(--accent);}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-img{width:52px;height:52px;image-rendering:auto;border:2px solid var(--accent);padding:2px;}
.logo-text{display:flex;flex-direction:column;gap:2px;}
.logo-pixel{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);text-shadow:2px 2px 0 rgba(233,69,96,0.3);letter-spacing:1px;line-height:1.6;}
.logo-sub{font-family:'VT323',monospace;font-size:16px;color:var(--accent3);letter-spacing:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.counter-box{text-align:right;}
.counter-num{font-family:'Press Start 2P',monospace;font-size:22px;color:var(--accent2);display:block;}
.counter-label{font-size:14px;color:var(--text2);letter-spacing:2px;}
.toggle-btn{background:var(--bg3);border:3px solid var(--border);color:var(--text);width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;box-shadow:3px 3px 0 var(--border);}
.toggle-btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--border);}
.toggle-btn svg{width:22px;height:22px;}
.pixel-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:10px 16px;border:3px solid currentColor;cursor:pointer;transition:all 0.1s;letter-spacing:1px;display:inline-flex;align-items:center;gap:8px;}
.pixel-btn:hover{transform:translate(-2px,-2px);}
.pixel-btn:active{transform:translate(1px,1px);}
.btn-primary{background:var(--accent);color:#fff;border-color:#fff;box-shadow:4px 4px 0 rgba(0,0,0,0.4);}
.btn-primary:hover{box-shadow:6px 6px 0 rgba(0,0,0,0.4);}
.btn-ghost{background:transparent;color:var(--accent3);border-color:var(--accent3);box-shadow:3px 3px 0 var(--accent3);}
.btn-ghost:hover{box-shadow:5px 5px 0 var(--accent3);}
.btn-sm{font-size:7px;padding:6px 10px;}
.btn-danger{background:transparent;color:var(--accent);border-color:var(--accent);box-shadow:3px 3px 0 var(--accent);}
.controls{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-family:'VT323',monospace;font-size:18px;padding:6px 16px;border:2px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;letter-spacing:2px;transition:all 0.1s;box-shadow:2px 2px 0 var(--border);}
.filter-btn:hover,.filter-btn.active{color:var(--text);border-color:var(--accent2);box-shadow:3px 3px 0 var(--accent2);background:var(--bg3);}
.filter-btn.active{color:var(--accent2);}
.spacer{flex:1;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:3px solid var(--accent);box-shadow:6px 6px 0 var(--accent);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:modalIn 0.15s ease;}
@keyframes modalIn{from{transform:translate(8px,8px);opacity:0;}to{transform:translate(0,0);opacity:1;}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:2px solid var(--border);background:var(--panel);}
.modal-title{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;}
.modal-close{background:none;border:2px solid var(--accent);color:var(--accent);width:32px;height:32px;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:10px;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--accent);}
.modal-body{padding:24px 20px;display:flex;flex-direction:column;gap:18px;}
.field{display:flex;flex-direction:column;gap:8px;}
label{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent3);letter-spacing:1px;}
input,textarea,select{background:var(--bg);border:2px solid var(--border);color:var(--text);font-family:'VT323',monospace;font-size:20px;padding:10px 14px;outline:none;width:100%;transition:border-color 0.15s;box-shadow:3px 3px 0 var(--border);}
input:focus,textarea:focus,select:focus{border-color:var(--accent3);box-shadow:3px 3px 0 var(--accent3);}
textarea{resize:vertical;min-height:80px;}
select option{background:var(--bg2);}
.photo-tabs{display:flex;gap:0;margin-bottom:8px;}
.photo-tab{font-family:'Press Start 2P',monospace;font-size:7px;padding:8px 14px;border:2px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;letter-spacing:1px;transition:all 0.1s;}
.photo-tab.active{background:var(--accent3);color:#000;border-color:var(--accent3);}
.photo-panel{display:none;}
.photo-panel.active{display:flex;flex-direction:column;gap:8px;}
.photo-preview{width:100%;height:140px;object-fit:cover;border:2px solid var(--border);display:none;}
.photo-preview.show{display:block;}
.upload-area{border:2px dashed var(--border);padding:20px;text-align:center;cursor:pointer;color:var(--text2);font-size:16px;transition:border-color 0.15s;}
.upload-area:hover{border-color:var(--accent3);color:var(--text);}
.upload-area input{display:none;}
.modal-footer{display:flex;gap:12px;padding:16px 20px;border-top:2px solid var(--border);justify-content:flex-end;}
.badge{font-family:'Press Start 2P',monospace;font-size:7px;padding:5px 10px;letter-spacing:1px;display:inline-flex;align-items:center;gap:6px;}
.badge-dreaming{background:rgba(0,212,255,0.1);border:2px solid var(--accent3);color:var(--accent3);}
.badge-visited{background:rgba(57,255,20,0.1);border:2px solid var(--green);color:var(--green);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
.card{background:var(--card-bg);border:3px solid var(--border);box-shadow:5px 5px 0 var(--border);transition:transform 0.1s,box-shadow 0.1s;position:relative;overflow:hidden;animation:cardIn 0.25s ease;cursor:pointer;}
@keyframes cardIn{from{transform:translate(4px,8px);opacity:0;}to{transform:translate(0,0);opacity:1;}}
.card:hover{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--accent);border-color:var(--accent);}
.card-img{width:100%;height:160px;object-fit:cover;display:block;border-bottom:3px solid var(--border);background:var(--bg3);}
.card-no-img{width:100%;height:160px;background:var(--bg3);display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--border);font-size:48px;color:var(--text2);font-family:'Press Start 2P',monospace;}
.card-body{padding:14px 16px;}
.card-name{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--text);margin-bottom:6px;line-height:1.6;word-break:break-word;}
.card-country{font-size:18px;color:var(--accent2);margin-bottom:8px;}
.card-notes{font-size:16px;color:var(--text2);margin-bottom:12px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.card-actions{display:flex;gap:6px;}
.empty{text-align:center;padding:60px 20px;grid-column:1/-1;}
.empty-pixel{font-family:'Press Start 2P',monospace;font-size:36px;color:var(--border);margin-bottom:16px;display:block;animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.empty-text{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--text2);line-height:2;letter-spacing:1px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:2px solid var(--green);color:var(--green);font-family:'Press Start 2P',monospace;font-size:8px;padding:12px 18px;box-shadow:4px 4px 0 var(--green);z-index:999;transform:translateY(80px);opacity:0;transition:all 0.2s;letter-spacing:1px;max-width:260px;line-height:1.8;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{border-color:var(--accent);color:var(--accent);box-shadow:4px 4px 0 var(--accent);}
.loading{text-align:center;padding:48px;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent3);letter-spacing:2px;grid-column:1/-1;}
.loading::after{content:'';animation:dots 1.2s step-end infinite;}
@keyframes dots{0%{content:'';}33%{content:'.';}66%{content:'..';}100%{content:'...';}}
.pixel-corner{position:absolute;width:8px;height:8px;background:var(--accent);}
.corner-tl{top:-1px;left:-1px;}.corner-tr{top:-1px;right:-1px;}.corner-bl{bottom:-1px;left:-1px;}.corner-br{bottom:-1px;right:-1px;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;}
.lightbox.open{display:flex;}
.lightbox-img{max-width:90vw;max-height:70vh;object-fit:contain;border:3px solid var(--accent);box-shadow:0 0 40px rgba(233,69,96,0.4);}
.lightbox-name{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--text);margin-bottom:6px;text-align:center;}
.lightbox-country{font-family:'VT323',monospace;font-size:22px;color:var(--accent2);text-align:center;}
.lightbox-close{position:absolute;top:20px;right:20px;background:none;border:2px solid var(--accent);color:var(--accent);width:40px;height:40px;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:12px;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--accent);}
::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);}::-webkit-scrollbar-thumb:hover{background:var(--accent);}
@media(max-width:500px){.logo-pixel{font-size:8px;}.grid{grid-template-columns:1fr;}.controls{gap:6px;}}
</style>
</head>

const manifest = {name:"Digi Bucket List",short_name:"DigiBucket",description:"Your pixel travel bucket list",start_url:".",display:"standalone",background_color:"#0a0a0f",theme_color:"#e94560",orientation:"portrait",icons:[{src:ICON192,sizes:"192x192",type:"image/png"},{src:ICON512,sizes:"512x512",type:"image/png"}]};
const mBlob = new Blob([JSON.stringify(manifest)],{type:"application/json"});
document.getElementById("manifest-ph").href = URL.createObjectURL(mBlob);
const swCode = `const CACHE="digi-v1";self.addEventListener("install",e=>{self.skipWaiting();});self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));if(e.request.method==="GET"){e.waitUntil(caches.open(CACHE).then(c=>c.add(e.request.url)).catch(()=>{}))}});`;
if("serviceWorker" in navigator){const b=new Blob([swCode],{type:"application/javascript"});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});}

let places=[],filter="all",editId=null,uploadedPhotoUrl="",activePhotoTab="upload",isDark=true,pendingFile=null;

function toggleTheme(){isDark=!isDark;document.body.classList.toggle("light",!isDark);document.getElementById("sunIcon").style.display=isDark?"block":"none";document.getElementById("moonIcon").style.display=isDark?"none":"block";}

async function sbFetch(path,opts={}){
  const r=await fetch(SUPABASE_URL+"/rest/v1/"+path,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":opts.prefer||"return=representation"},method:opts.method||"GET",body:opts.body});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):null;
}

async function loadPlaces(){
  try{const d=await sbFetch(TABLE+"?order=created_at.desc",{prefer:""});places=d||[];render();}
  catch(e){console.error(e);showToast("FAILED TO LOAD: "+e.message,true);document.getElementById("loadingEl").textContent="ERROR";}
}

async function savePlace(){
  const name=document.getElementById("fName").value.trim();
  const country=document.getElementById("fCountry").value.trim();
  const status=document.getElementById("fStatus").value;
  const notes=document.getElementById("fNotes").value.trim();
  if(!name||!country){showToast("NAME & COUNTRY REQUIRED",true);return;}
  const btn=document.getElementById("saveBtn");btn.textContent="SAVING...";btn.disabled=true;
  let photo=activePhotoTab==="url"?document.getElementById("fPhotoUrl").value.trim():uploadedPhotoUrl;
  if(activePhotoTab==="upload"&&pendingFile){
    try{photo=await uploadToCloudinary(pendingFile);}
    catch(e){showToast("PHOTO UPLOAD FAILED",true);btn.textContent="SAVE PLACE";btn.disabled=false;return;}
  }
  const payload={name,country,status,notes,photo_url:photo||null};
  try{
    if(editId){await sbFetch(TABLE+"?id=eq."+editId,{method:"PATCH",body:JSON.stringify(payload)});showToast("UPDATED!");}
    else{await sbFetch(TABLE,{method:"POST",body:JSON.stringify(payload)});showToast("PLACE ADDED!");}
    closeModal();loadPlaces();
  }catch(e){showToast("SAVE FAILED",true);}
  btn.textContent="SAVE PLACE";btn.disabled=false;
}

async function deletePlace(id,e){e.stopPropagation();if(!confirm("DELETE THIS PLACE?"))return;
  try{await sbFetch(TABLE+"?id=eq."+id,{method:"DELETE",prefer:""});showToast("DELETED!");loadPlaces();}
  catch(e){showToast("DELETE FAILED",true);}
}

async function toggleStatus(id,cur,e){e.stopPropagation();
  const s=cur==="dreaming"?"visited":"dreaming";
  try{await sbFetch(TABLE+"?id=eq."+id,{method:"PATCH",body:JSON.stringify({status:s})});loadPlaces();}
  catch(e){showToast("UPDATE FAILED",true);}
}

async function uploadToCloudinary(file){
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",CLOUDINARY_PRESET);
  const r=await fetch("https://api.cloudinary.com/v1_1/"+CLOUDINARY_CLOUD+"/image/upload",{method:"POST",body:fd});
  const d=await r.json();return d.secure_url;
}

function handleFileUpload(input){
  const file=input.files[0];if(!file)return;pendingFile=file;
  const reader=new FileReader();
  reader.onload=e=>{const p=document.getElementById("previewUpload");p.src=e.target.result;p.classList.add("show");};
  reader.readAsDataURL(file);
}

function previewUrl(url){const p=document.getElementById("previewUrl");if(url){p.src=url;p.classList.add("show");}else{p.src="";p.classList.remove("show");}}

function switchPhotoTab(tab,el){
  activePhotoTab=tab;
  document.querySelectorAll(".photo-tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");
  document.querySelectorAll(".photo-panel").forEach(p=>p.classList.remove("active"));
  document.getElementById("panel"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
}

function openModal(place=null){
  editId=place?place.id:null;
  document.getElementById("modalTitle").textContent=place?"EDIT PLACE":"ADD NEW PLACE";
  document.getElementById("fName").value=place?.name||"";
  document.getElementById("fCountry").value=place?.country||"";
  document.getElementById("fStatus").value=place?.status||"dreaming";
  document.getElementById("fNotes").value=place?.notes||"";
  document.getElementById("fPhotoUrl").value="";
  uploadedPhotoUrl=place?.photo_url||"";pendingFile=null;
  document.getElementById("previewUpload").classList.remove("show");
  document.getElementById("previewUrl").classList.remove("show");
  if(place?.photo_url){
    document.getElementById("previewUrl").src=place.photo_url;
    document.getElementById("previewUrl").classList.add("show");
    document.getElementById("fPhotoUrl").value=place.photo_url;
    switchPhotoTab("url",document.querySelectorAll(".photo-tab")[1]);
  }else{switchPhotoTab("upload",document.querySelectorAll(".photo-tab")[0]);}
  document.getElementById("overlay").classList.add("open");
}

function closeModal(){document.getElementById("overlay").classList.remove("open");editId=null;pendingFile=null;}
function setFilter(f,el){filter=f;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");render();}

function openLightbox(p,e){
  if(e.target.closest(".card-actions"))return;
  if(!p.photo_url)return;
  document.getElementById("lightboxImg").src=p.photo_url;
  document.getElementById("lightboxName").textContent=p.name;
  document.getElementById("lightboxCountry").innerHTML='<svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-right:6px;image-rendering:pixelated"><rect x="4" y="0" width="6" height="2" fill="#e94560"/><rect x="2" y="2" width="10" height="2" fill="#e94560"/><rect x="0" y="4" width="14" height="6" fill="#e94560"/><rect x="2" y="10" width="10" height="2" fill="#e94560"/><rect x="4" y="12" width="6" height="2" fill="#e94560"/><rect x="5" y="14" width="4" height="2" fill="#c73652"/><rect x="6" y="16" width="2" height="2" fill="#c73652"/><rect x="4" y="5" width="2" height="2" fill="rgba(255,255,255,0.4)"/></svg>'+p.country;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox(){document.getElementById("lightbox").classList.remove("open");}

function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function render(){
  const grid=document.getElementById("grid");
  const filtered=filter==="all"?places:places.filter(p=>p.status===filter);
  document.getElementById("totalCount").textContent=places.length;
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty"><span class="empty-pixel">?</span><div class="empty-text">NO PLACES FOUND<br><br>ADD YOUR DREAM DESTINATIONS</div></div>`;return;
  }
  grid.innerHTML=filtered.map(p=>{
    const pd=JSON.stringify(p).replace(/"/g,"&quot;");
    return `<div class="card" onclick="openLightbox(${pd},event)">
      <div class="pixel-corner corner-tl"></div><div class="pixel-corner corner-tr"></div><div class="pixel-corner corner-bl"></div><div class="pixel-corner corner-br"></div>
      ${p.photo_url?`<img class="card-img" src="${esc(p.photo_url)}" alt="${esc(p.name)}" loading="lazy">`:``}
      <div class="card-no-img" style="${p.photo_url?"display:none":""}">?</div>
      <div class="card-body">
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-country"><svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-right:6px;image-rendering:pixelated"><rect x="4" y="0" width="6" height="2" fill="#e94560"/><rect x="2" y="2" width="10" height="2" fill="#e94560"/><rect x="0" y="4" width="14" height="6" fill="#e94560"/><rect x="2" y="10" width="10" height="2" fill="#e94560"/><rect x="4" y="12" width="6" height="2" fill="#e94560"/><rect x="5" y="14" width="4" height="2" fill="#c73652"/><rect x="6" y="16" width="2" height="2" fill="#c73652"/><rect x="4" y="5" width="2" height="2" fill="rgba(255,255,255,0.4)"/></svg>${esc(p.country)}</div>
        ${p.notes?`<div class="card-notes">${esc(p.notes)}</div>`:""}
        <div class="card-footer">
          <span class="badge badge-${p.status}">${p.status==="dreaming"?`<svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated"><rect x="2" y="0" width="8" height="2" fill="#00d4ff"/><rect x="0" y="2" width="2" height="4" fill="#00d4ff"/><rect x="10" y="2" width="2" height="4" fill="#00d4ff"/><rect x="2" y="6" width="2" height="2" fill="#00d4ff"/><rect x="6" y="4" width="2" height="2" fill="#00d4ff"/><rect x="4" y="8" width="4" height="2" fill="#00d4ff"/><rect x="2" y="10" width="8" height="2" fill="#00d4ff"/></svg> DREAMING`:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated"><rect x="0" y="6" width="2" height="2" fill="#39ff14"/><rect x="2" y="8" width="2" height="2" fill="#39ff14"/><rect x="4" y="10" width="2" height="2" fill="#39ff14"/><rect x="6" y="6" width="2" height="2" fill="#39ff14"/><rect x="8" y="4" width="2" height="2" fill="#39ff14"/><rect x="10" y="2" width="2" height="2" fill="#39ff14"/></svg> VISITED`}</span>
          <div class="card-actions">
            <button class="pixel-btn btn-sm btn-ghost" onclick="toggleStatus('${p.id}','${p.status}',event)">&#x21BA;</button>
            <button class="pixel-btn btn-sm btn-ghost" onclick="event.stopPropagation();openModal(${pd})">&#x270E;</button>
            <button class="pixel-btn btn-sm btn-danger" onclick="deletePlace('${p.id}',event)">&#x2715;</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

let toastTimer;
function showToast(msg,err=false){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(err?" error":"");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),3500);}

document.getElementById("overlay").addEventListener("click",e=>{if(e.target===document.getElementById("overlay"))closeModal();});
document.getElementById("lightbox").addEventListener("click",e=>{if(e.target===document.getElementById("lightbox"))closeLightbox();});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal();closeLightbox();}});

loadPlaces();
</script>
</body>
</html>
